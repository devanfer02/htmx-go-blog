{{ define "Navbar" }}
<nav class="bg-red-500 w-full px-5 py-5 flex items-center text-white">
    <h1 class="text-xl font-bold">Blog App</h1>
    <ul class="pl-5 font-semibold flex gap-x-5">
        {{ range index . 0 }}
        <li class="hover:bg-white hover:text-red-500 ease-in-out duration-300 rounded-lg px-2 py-1">
            <a href="{{ .path }}">
                {{ .title }}
            </a>
        </li>
        {{ end }}
    </ul>
</nav>
{{ end }}
